version: 2

models:
  - name: dim_customers
    description: "Dimension table containing cleaned and segmented customer details."
    columns:
      - name: customer_key
        tests:
          - unique
          - not_null

  - name: dim_products
    description: "Dimension table for products with value segmentation."
    columns:
      - name: product_key
        tests:
          - unique
          - not_null

  - name: dim_date
    description: "Static date dimension for time-series analysis and fiscal reporting."
    columns:
      - name: date_key
        tests:
          - unique
          - not_null

  - name: fact_sales
    description: "Incremental fact table capturing all sales transactions."
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: customer_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: customer_key
      - name: product_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_products')
              field: product_key
      - name: date_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key